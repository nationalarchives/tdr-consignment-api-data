name: Run DB Migrations
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        options:
          - intg
          - staging
          - prod
        default: 'intg'
permissions:
  id-token: write

run-name: Run DB Migrations to ${{inputs.environment}}

jobs:
  run-lambda:
    environment: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: role-name
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
            env = os.environ['ENVIRONMENT']
            print(f"role-name=TDRGithubActionsDeployLambda{env.title()}", file=fh)
        shell: python
      - name: Configure AWS credentials for Lambda
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/${{ steps.role-name.outputs.role-name }}
          aws-region: eu-west-2
          role-session-name: ECRLogin
      - name: Invoke lambda
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: aws lambda invoke --function-name "tdr-database-migrations-${ENVIRONMENT}" out
