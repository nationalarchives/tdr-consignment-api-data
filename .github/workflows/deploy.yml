name: TDR Deploy Data Migration Lambda
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment'
        required: true
        options:
          - intg
          - staging
          - prod
        default: 'intg'
      to-deploy:
        description: 'Version to deploy'
        required: true

run-name: Deploying Data Migration Lambda ${{inputs.to-deploy}} to ${{inputs.environment}}
permissions: {}
jobs:
  deploy:
    permissions:
      id-token: write
      contents: write
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_deploy.yml@f318ce8a5d99c08b1235663f97fdb1b35844674e # v0.0.39
    with:
      lambda-name: database-migrations
      deployment-package: db-migrations.jar
      environment: ${{ github.event.inputs.environment }}
      to-deploy: ${{ github.event.inputs.to-deploy }}
    secrets:
      ACCOUNT_NUMBER: ${{ secrets.ACCOUNT_NUMBER }}
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  db-migration:
    needs: deploy
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: gh workflow run run.yml -f environment="$ENVIRONMENT"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          ENVIRONMENT: ${{ inputs.environment }}
